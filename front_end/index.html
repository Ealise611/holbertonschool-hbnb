<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <a href="index.html"><img src="images/logo.png" alt="app logo" class="logo"></a>
        <nav>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>
    <main>
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <!-- Options will be populated dynamically -->
            </select>
        </section>
        <section id="places-list">
            <!-- List of places will be populated dynamically -->
            <div class="row">
                <div class="column">
                    <div class="place-card">
                        <h3>Beautiful Beach House</h3>
                        <p>Price per night: $150</p>
                        <button class="details-button">View Details</button>
                    </div>
                </div>
                <div class="column">
                    <div class="place-card">
                        <h3>Cozy Cabin</h3>
                        <p>Price per night: $100</p>
                        <button class="details-button">View Details</button>
                    </div>
                </div>
                <div class="column">
                    <div class="place-card">
                        <h3>Modern Apartment</h3>
                        <p>Price per night: $200</p>
                        <button class="details-button">View Details</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="scripts.js"></script>
    <footer class="footer">
        <p>© 2025 HBnB Evolution. All rights reserved.</p>
    </footer>
</body>

</html>
