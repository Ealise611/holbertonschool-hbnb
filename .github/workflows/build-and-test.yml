name: Build and Test with Pytest

on:
  push:
    branches: [ main, Main, feat/cicd ]
  pull_request:
    branches: [ main, Main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hbnb
    
    strategy:
      matrix:
        python-version: ["3.8"]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hbnb_test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: "3.8"
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.8-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.8-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install pytest and related packages
        pip install pytest pytest-flask pytest-cov faker
        
    - name: Wait for MySQL
      run: |
        while ! mysqladmin ping -h"127.0.0.1" -P3306 -uroot -proot --silent; do
          echo "Waiting for MySQL..."
          sleep 2
        done
        echo "MySQL is ready!"
        
    - name: Setup test database
      run: |
        mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS hbnb_test_db;"
        mysql -h127.0.0.1 -P3306 -uroot -proot -e "SHOW DATABASES;"
        
    - name: Run Pytest Tests
      env:
        MYSQL_HOST: 127.0.0.1
        MYSQL_PORT: 3306
        MYSQL_USER: root
        MYSQL_PASSWORD: root
        MYSQL_DATABASE: hbnb_test_db
      run: |
        # Run ONLY the pytest tests from pytest_tests/ directory
        pytest pytest_tests/ -v --tb=short --disable-warnings \
          --junitxml=test-results.xml \
          --cov=app --cov-report=xml --cov-report=html \
          --cov-report=term-missing
        
        echo "✅ Pytest tests completed"
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          hbnb/test-results.xml
          hbnb/htmlcov/

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hbnb
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.8
      uses: actions/setup-python@v4
      with:
        python-version: "3.8"
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.8-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.8-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Test Flask app runs
      run: |
        # Test that the app can be imported and created
        python -c "
        from app import create_app
        app = create_app()
        print('✅ App created successfully')
        print(f'✅ App name: {app.name}')
        print(f'✅ App config: {app.config.get(\"ENV\", \"default\")}')
        "
        
        # Test that the app can start (run in background for a short time)
        timeout 10s python run.py &
        APP_PID=$!
        
        # Wait for app to start
        sleep 3
        
        # Test that something is running on port 5000
        if netstat -tuln | grep -q ":5000 "; then
          echo "✅ Flask app is running on port 5000"
        else
          echo "⚠️ App might not be running on port 5000"
        fi
        
        # Clean up
        kill $APP_PID 2>/dev/null || true
        
        echo "✅ Flask app startup test completed"