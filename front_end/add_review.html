<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review - HBnB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>

<body>
    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <div class="brand-text">HBnB</div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link">Login</a>
        </nav>
    </header>

    <main>
        <!-- Place information will be dynamically inserted here -->

        <form id="review-form">
            <h2>Add Your Review</h2>

            <label for="review">Your Review:</label>
            <textarea id="review" name="review" rows="5" placeholder="Share your experience about this place..."
                required>
            </textarea>

            <label for="rating">Rating:</label>
            <select id="rating" name="rating" required>
                <option value="">Select a rating</option>
                <option value="1">⭐ 1 Star - Poor</option>
                <option value="2">⭐⭐ 2 Stars - Fair</option>
                <option value="3">⭐⭐⭐ 3 Stars - Good</option>
                <option value="4">⭐⭐⭐⭐ 4 Stars - Very Good</option>
                <option value="5">⭐⭐⭐⭐⭐ 5 Stars - Excellent</option>
            </select>

            <button type="submit">Submit Review</button>
            <button type="button" onclick="window.history.back()"
                style="background: #6c757d; margin-left: 10px;">Cancel</button>
        </form>
    </main>

    <footer class="footer">
        <p>© 2025 HBnB Evolution. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
