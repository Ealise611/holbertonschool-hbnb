[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v --tb=short --strict-markers

# Markers
markers =
    models: Tests for model classes
    facade: Tests for facade functionality
    integration: Integration tests
    unit: Unit tests

# Minimum version
minversion = 6.0

# Test timeout
timeout = 300