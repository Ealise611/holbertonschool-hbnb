name: Build and Test

on:
  push:
    branches: [ main, Main, feat/cicd ]
  pull_request:
    branches: [ main, Main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hbnb
    
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd tests
        python run_part3_tests.py

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: hbnb
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.12-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build and test Flask app
      run: |
        # Test that the app can be imported and created
        python -c "from app import create_app; app = create_app(); print('✅ App created successfully')"
        
        # Test that the app can start (run in background)
        python run.py &
        APP_PID=$!
        
        # Wait for app to start
        sleep 5
        
        # Test basic health check
        curl -f http://localhost:5000/ || exit 1
        
        # Test API documentation endpoint
        curl -f http://localhost:5000/ || exit 1
        
        # Kill the background process
        kill $APP_PID
        
        echo "✅ Flask app builds and runs successfully"

