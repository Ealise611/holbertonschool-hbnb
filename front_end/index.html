<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <div class="brand-text">HBnB</div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link">Login</a>
        </nav>
    </header>
    <main>
        <section id="filter">
            <div class="filter-container">
                <label for="price-filter">Filter by Price:</label>
                <select id="price-filter">
                    <option value="all">All</option>
                    <option value="10">10</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </section>
        <section id="places-list">
            <p>Loading...</p>
            <!-- List of places will be populated dynamically -->
        </section>
    </main>
    <script src="scripts.js"></script>
    <footer class="footer">
        <p>© 2025 HBnB Evolution. All rights reserved.</p>
    </footer>
    <div id="popup-overlay" class="popup-overlay popup-hidden">
        <div class="popup-content">
            <button class="popup-close" onclick="closePopup()">&times;</button>

            <!-- Add image section -->
            <div class="popup-image">
                <img src="images/singlecats.jpg" alt="Special Offer" onerror="this.style.display='none'">
            </div>

            <div class="popup-header">
            </div>
            <div class="popup-body">
                <h2><strong>Single cats in your area</h2>
                <div class="features">
                    <div class="feature">Fluffy and ready to mingle</div>
                    <div class="feature">Professional lap warmers</div>
                    <div class="feature">Knock things off your desk</div>
                    <div class="feature">3am zoomies included</div>
                </div>
                <div class="popup-buttons">
                    <button class="popup-btn primary" onclick="closePopup()">😻 Chat & Pat Now</button>
                    <button class="popup-btn secondary" onclick="closePopup()">Maybe Later</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
