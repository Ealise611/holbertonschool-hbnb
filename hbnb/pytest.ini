[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --disable-warnings
    -W ignore::DeprecationWarning
markers =
    unit: Unit tests
    integration: Integration tests
    auth: Authentication tests
    mysql: MySQL database tests
    api: API endpoint tests
    slow: Slow running tests